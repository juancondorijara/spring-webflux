# kubectl apply -f 4-deployment.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: 00-juan-condori-deployment
  namespace: juan
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 00-juan-condori-deployment        # Debe coincidir con las etiquetas del Service
  template:
    metadata:
      labels:
        app: 00-juan-condori-deployment      # Debe coincidir con las etiquetas del Service
    spec:
      containers:
      - name: 00-juan-condori-container
        image: juan321/webflux-nosql:1.0   # Reemplaza con tu imagen Docker Hub
        imagePullPolicy: IfNotPresent        # Evitar traer siempre la última versión si hay una actual
        #envFrom:
        #- secretRef:
        #    name: 00-juan-condori-secret  # Esto cargará todos los valores como variables de entorno